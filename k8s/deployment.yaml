apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: express-demo
  template:
    metadata:
      labels:
        app: express-demo
    spec:
      containers:
      - name: express-demo-container
        image: IMAGE_PLACEHOLDER # Jenkins will automatically replace this
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: express-demo-service
spec:
  type: NodePort
  selector:
    app: express-demo
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30001